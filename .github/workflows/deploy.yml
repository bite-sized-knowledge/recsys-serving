name: Deploy FastAPI to EC2

on:
  push:
    branches: [ "prod" ]
  workflow_dispatch:
    inputs:
      manual_branch:
        description: Set branch
        required: true
        type: string
        default: prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SSH to EC2 and Deploy FastAPI
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "1) 코드 업데이트"
            cd ~/recsys-serving
            git pull origin prod

            echo "2) Conda 환경 설정"
            source ~/miniconda3/etc/profile.d/conda.sh
            if conda env list | grep -q "recsys-env"; then
                echo "기존 환경 'recsys-env' 발견. 업데이트 진행..."
                conda env update -n recsys-env -f ~/recsys-serving/environment.yml
            else
                echo "환경 'recsys-env'이 없음. 새로 생성합니다..."
                conda create -n recsys-env -f ~/recsys-serving/environment.yml -y
            fi

            echo "3) 환경 변수 설정"
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export DATABASE_USER="${{ secrets.DATABASE_USER }}"
            export DATABASE_PASSWORD="${{ secrets.DATABASE_PASSWORD }}"

            echo "4) 기존 프로세스 종료"
            pkill -f "uvicorn main:app" || true

            echo "5) FastAPI 실행"
            nohup uvicorn main:app --host 0.0.0.0 --port 8000 --reload &

            echo "Deployment complete! FastAPI is running."