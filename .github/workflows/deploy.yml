name: Deploy FastAPI to EC2

on:
  push:
    branches: [ "prod" ]
  workflow_dispatch:
    inputs:
      manual_branch:
        description: Set branch
        required: true
        type: string
        default: prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SSH to EC2 and Deploy FastAPI
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "1) 코드 업데이트"
            echo ""
            cd ~/recsys-serving
            git pull origin prod

            echo "2) Conda 환경 설정"
            if conda env list | grep -q "recsys-env"; then
                echo "기존 환경 'recsys-env' 발견. 업데이트 진행..."
                conda env update --file=./environment.yml --prune -q
            else
                echo "환경 'recsys-env'이 없음. 새로 생성합니다..."
                conda env create --file=./environment.yml -q
            fi
            conda activate recsys-env
            echo "환경 활성화 완료"
            echo ""

            echo "3) 환경 변수 설정"
            export ENVIRONMENT="${{ secrets.ENVIRONMENT }}"
            export DB_HOST="${{ secrets.DB_HOST }}"
            export DB_PORT="${{ secrets.DB_PORT }}"
            export DB_NAME="${{ secrets.DB_NAME }}"
            export DB_USER="${{ secrets.DB_USER }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export SSH_HOST="${{ secrets.SSH_HOST }}"
            export SSH_PORT="${{ secrets.SSH_PORT }}"
            export SSH_USER="${{ secrets.SSH_USER }}"
            export SSH_KEY="${{ secrets.SSH_KEY }}"
            export DYNAMODB_REGION="${{ secrets.DYNAMODB_REGION }}"
            export DYNAMODB_ENDPOINT_URL="${{ secrets.DYNAMODB_ENDPOINT_URL }}"
            export QDRANT_URL="${{ secrets.QDRANT_URL }}"
            export QDRANT_API_KEY="${{ secrets.QDRANT_API_KEY }}"
            export QDRANT_COLLECTION_NAME="${{ secrets.QDRANT_COLLECTION_NAME }}"
            echo ""

            echo "4) 기존 FastAPI 서버 프로세스 종료"
            PORT=8000
            CURRENT_PID=$(lsof -t -i :$PORT)

            if [ -n "$CURRENT_PID" ]; then
                echo "기존 프로세스($CURRENT_PID) 종료 중..."
                kill -9 $CURRENT_PID
                echo "기존 프로세스($CURRENT_PID) 종료 완료"
            else
                echo "기존 프로세스가 실행 중이지 않음"
            fi

            echo "5) FastAPI 새 프로세스 기동"
            nohup python server.py > ~/logs/recsys.log 2>&1 &
            echo ""

            echo "6) 헬스체크 (반복 재시도)"
            MAX_RETRIES=10
            SLEEP_INTERVAL=3
            SUCCESS="false"

            for ((i=1; i<=MAX_RETRIES; i++))
            do
              STATUS_CODE=$(curl -f -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || true)
              echo "  [Retry: $i/$MAX_RETRIES] 헬스체크 응답코드: $STATUS_CODE"
              
              if [ "$STATUS_CODE" = "200" ]; then
                echo "헬스체크 성공! (배포가 정상 완료되었습니다.)"
                SUCCESS="true"
                break
              else
                echo "헬스체크 실패... $SLEEP_INTERVAL초 후 재시도"
                sleep $SLEEP_INTERVAL
              fi
            done

            if [ "$SUCCESS" != "true" ]; then
              echo "헬스체크 최종 실패! 배포 실패 처리"
              exit 1  # GitHub Actions에서 FAIL로 표시됨
            fi
            echo ""

            echo "헬스체크 통과! 프로세스 정상 구동 중."
