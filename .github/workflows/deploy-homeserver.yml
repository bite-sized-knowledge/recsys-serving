name: Deploy Recsys API to Home Server

on:
  push:
    branches: ["prod"]
    paths:
      - 'app/**'
      - 'server.py'
      - 'Dockerfile'
      - 'environment.yml'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy connectivity
        id: deploy_guard
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          if [ -z "$SSH_HOST" ] || [ -z "$SSH_PORT" ] || [ -z "$SSH_USER" ] || [ -z "$SSH_KEY" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if timeout 5 bash -lc "</dev/tcp/$SSH_HOST/$SSH_PORT" 2>/dev/null; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=false" >> "$GITHUB_OUTPUT"

      - name: Deploy recsys-api on home server
        if: steps.deploy_guard.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/projects/recsys-serving
            git pull origin prod
            cd ~/projects/infra
            docker compose build recsys-api
            docker compose up -d recsys-api
            ATTEMPTS=15
            for i in $(seq 1 $ATTEMPTS); do
              STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/health || true)
              if [ "$STATUS_CODE" = "200" ]; then
                exit 0
              fi
              sleep 4
            done
            echo "health check failed"
            exit 1
